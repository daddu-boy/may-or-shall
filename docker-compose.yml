version: "3.9"

# Single-container deployment: the app plus its SQLite database file.
# All data stays on the host volume — India data residency by construction.
services:
  app:
    build: .
    environment:
      DATABASE_URL: file:/data/storage/mayorshall.db
      STORAGE_DIR: /data/storage
    volumes:
      - appdata:/data
    ports:
      - "3000:3000"

volumes:
  appdata:
